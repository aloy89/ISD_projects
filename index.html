<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Manager - Team Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Header -->
    <header class="nav-header">
        <div class="nav-container">
            <div class="nav-brand">
                <h1>Project Manager</h1>
            </div>
            <nav class="nav-links">
                <button class="nav-link" data-view="dashboard">Dashboard</button>
                <button class="nav-link" data-view="projects">Projects</button>
                <button class="nav-link" data-view="search">Search</button>
            </nav>
            <div class="nav-actions">
                <button class="btn btn--primary btn--sm" id="newProjectBtn">New Project</button>
                <button class="btn btn--outline btn--sm" id="exportBtn">Export Data</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
                <button class="btn btn--outline btn--sm" id="importBtn">Import Data</button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Dashboard View -->
        <div id="dashboardView" class="view active">
            <div class="container">
                <div class="dashboard-header">
                    <h2>Dashboard</h2>
                    <p class="text-secondary">Overview of your projects and tasks</p>
                </div>
                
                <div class="dashboard-stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalProjects">0</div>
                        <div class="stat-label">Total Projects</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="activeTasks">0</div>
                        <div class="stat-label">Active Tasks</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="completedTasks">0</div>
                        <div class="stat-label">Completed Tasks</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="overdueTasks">0</div>
                        <div class="stat-label">Overdue Tasks</div>
                    </div>
                </div>

                <div class="dashboard-content">
                    <div class="dashboard-section">
                        <h3>Recent Projects</h3>
                        <div id="recentProjects" class="project-cards"></div>
                    </div>
                    
                    <div class="dashboard-section">
                        <h3>Upcoming Deadlines</h3>
                        <div id="upcomingTasks" class="task-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Projects View -->
        <div id="projectsView" class="view">
            <div class="container">
                <div class="projects-header">
                    <h2>All Projects</h2>
                    <div class="projects-actions">
                        <select id="projectStatusFilter" class="form-control">
                            <option value="">All Statuses</option>
                            <option value="Active">Active</option>
                            <option value="On Hold">On Hold</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                        <button class="btn btn--primary" id="newProjectBtn2">New Project</button>
                    </div>
                </div>
                <div id="projectsList" class="project-cards"></div>
            </div>
        </div>

        <!-- Project Detail View -->
        <div id="projectDetailView" class="view">
            <div class="container">
                <div class="project-detail-header">
                    <button class="btn btn--outline btn--sm" id="backToProjects">← Back to Projects</button>
                    <div class="project-detail-actions">
                        <button class="btn btn--secondary btn--sm" id="editProjectBtn">Edit Project</button>
                        <button class="btn btn--primary btn--sm" id="newTaskBtn">New Task</button>
                    </div>
                </div>
                
                <div class="project-detail-info">
                    <h2 id="projectTitle"></h2>
                    <p id="projectDescription"></p>
                    <div class="project-meta">
                        <span class="status" id="projectStatus"></span>
                        <span class="date-range" id="projectDates"></span>
                        <div class="progress-bar">
                            <div class="progress-fill" id="projectProgress"></div>
                        </div>
                    </div>
                </div>

                <div class="tasks-section">
                    <div class="tasks-header">
                        <h3>Tasks</h3>
                        <div class="task-filters">
                            <select id="taskStatusFilter" class="form-control">
                                <option value="">All Statuses</option>
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                                <option value="Blocked">Blocked</option>
                            </select>
                            <select id="taskAssigneeFilter" class="form-control">
                                <option value="">All Assignees</option>
                            </select>
                        </div>
                    </div>
                    <div id="tasksList" class="tasks-list"></div>
                </div>
            </div>
        </div>

        <!-- Search View -->
        <div id="searchView" class="view">
            <div class="container">
                <div class="search-header">
                    <h2>Search</h2>
                    <div class="search-box">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search projects and tasks...">
                    </div>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>
    </main>

    <!-- Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="projectModalTitle">New Project</h3>
                <button class="modal-close" id="closeProjectModal">&times;</button>
            </div>
            <form id="projectForm">
                <div class="form-group">
                    <label class="form-label">Project Name *</label>
                    <input type="text" id="projectName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="projectDescription" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="projectStatusSelect" class="form-control">
                        <option value="Active">Active</option>
                        <option value="On Hold">On Hold</option>
                        <option value="Completed">Completed</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Start Date</label>
                    <input type="date" id="projectStartDate" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">End Date</label>
                    <input type="date" id="projectEndDate" class="form-control">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn--outline" id="cancelProjectBtn">Cancel</button>
                    <button type="submit" class="btn btn--primary" id="saveProjectBtn">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="taskModalTitle">New Task</h3>
                <button class="modal-close" id="closeTaskModal">&times;</button>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label class="form-label">Task Name *</label>
                    <input type="text" id="taskName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Current Status</label>
                    <textarea id="taskCurrentStatus" class="form-control" rows="2" placeholder="Describe the current state of this task..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Next Steps</label>
                    <textarea id="taskNextSteps" class="form-control" rows="2" placeholder="What needs to be done next..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="taskStatus" class="form-control">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                        <option value="Blocked">Blocked</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select id="taskPriority" class="form-control">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Person in Charge</label>
                    <select id="taskPersonInCharge" class="form-control">
                        <option value="">Select assignee...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Due Date</label>
                    <input type="date" id="taskDueDate" class="form-control">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn--outline" id="cancelTaskBtn">Cancel</button>
                    <button type="submit" class="btn btn--primary" id="saveTaskBtn">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div id="taskDetailModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="taskDetailTitle">Task Details</h3>
                <div class="modal-header-actions">
                    <button class="btn btn--secondary btn--sm" id="editTaskBtn">Edit</button>
                    <button class="btn btn--outline btn--sm" id="deleteTaskBtn">Delete</button>
                    <button class="modal-close" id="closeTaskDetailModal">&times;</button>
                </div>
            </div>
            <div class="task-detail-content">
                <div class="task-detail-main">
                    <div class="task-detail-info">
                        <div class="task-meta">
                            <span class="status" id="taskDetailStatus"></span>
                            <span class="priority" id="taskDetailPriority"></span>
                            <span class="assignee" id="taskDetailAssignee"></span>
                            <span class="due-date" id="taskDetailDueDate"></span>
                        </div>
                        <div class="task-description">
                            <h4>Current Status</h4>
                            <p id="taskDetailCurrentStatus"></p>
                            <h4>Next Steps</h4>
                            <p id="taskDetailNextSteps"></p>
                        </div>
                    </div>
                </div>
                <div class="task-detail-notes">
                    <div class="notes-header">
                        <h4>Notes</h4>
                        <button class="btn btn--primary btn--sm" id="addNoteBtn">Add Note</button>
                    </div>
                    <div class="add-note-form" id="addNoteForm" style="display: none;">
                        <textarea id="newNoteText" class="form-control" rows="3" placeholder="Add a note..."></textarea>
                        <div class="form-actions">
                            <button class="btn btn--outline btn--sm" id="cancelNoteBtn">Cancel</button>
                            <button class="btn btn--primary btn--sm" id="saveNoteBtn">Save Note</button>
                        </div>
                    </div>
                    <div id="taskNotesList" class="notes-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3 id="confirmTitle">Confirm Action</h3>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">Are you sure?</p>
            </div>
            <div class="modal-actions">
                <button class="btn btn--outline" id="confirmCancel">Cancel</button>
                <button class="btn btn--primary" id="confirmAction">Confirm</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
